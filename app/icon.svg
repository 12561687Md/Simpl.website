<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" role="img" aria-labelledby="t d">
  <title id="t">SIMPL</title>
  <desc id="d">Dark rounded tile with the SIMPL vitalsign pulse and the green identity dot beneath it.</desc>
  <!--
    A purpose-built simplification of the brand mark, not the kit artwork.

    Why it deviates: the kit's vitalsign is a filled shape with a hairline pulse.
    Rasterised to 16px it renders as a grey dagger with a speck — the pulse falls
    below one pixel and the dot disappears. It cannot be fattened either, because
    it's a filled outline rather than a stroke, so there is no width to turn up.

    So this redraws the same gesture — flat baseline, sharp peak, deep trough,
    flat baseline, dot beneath — as a stroked path at a weight that survives a
    browser tab (6/64 = 1.5px at 16px). Same shape language, legible at every size.

    The green dot is oversized relative to the kit on purpose: per the brand kit
    the dot IS the identity, and at 16px it is the only element that reliably
    reads. Keep it pure #9BFF1A here — the tile behind it is dark, so the light-
    background variant (#7BD100) would only mute it.
  -->
  <rect width="64" height="64" rx="14" fill="#0E0F10"/>
  <path
    d="M6 28 H25 L30 9 L36 46 L41 28 H58"
    stroke="#EDEBE4"
    stroke-width="6"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"/>
  <circle cx="36" cy="56" r="5.5" fill="#9BFF1A"/>
</svg>
