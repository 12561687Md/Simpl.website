/* ------------------------------------------------------------------ */
/* Score                                                               */
/* ------------------------------------------------------------------ */

function useCountUp(target, durationMs, start) {
  const [val, setVal] = useState(0);
  useEffect(() => {
    if (!start) return;
    let raf; const t0 = performance.now();
    const tick = (now) => {
      const t = Math.min(1, (now - t0) / durationMs);
      const eased = 1 - Math.pow(1 - t, 3);
      setVal(Math.round(target * eased));
      if (t < 1) raf = requestAnimationFrame(tick);
    };
    raf = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(raf);
  }, [target, durationMs, start]);
  return val;
}

function ScoreDial({ value, size }) {
  const stroke = 2;
  const r = size / 2 - stroke;
  const c = 2 * Math.PI * r;
  const offset = c * (1 - value / 100);
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} aria-hidden="true"
      style={{ position: "absolute", inset: 0, margin: "auto", opacity: 0.55 }}>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="var(--rule)" strokeWidth={stroke} />
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="var(--accent)" strokeWidth={stroke}
        strokeLinecap="round"
        strokeDasharray={c}
        strokeDashoffset={offset}
        transform={`rotate(-90 ${size/2} ${size/2})`}
        style={{ transition: "stroke-dashoffset 1400ms cubic-bezier(.2,.6,.2,1)" }} />
    </svg>
  );
}

function Score() {
  const ref = useRef(null);
  const [start, setStart] = useState(false);
  useEffect(() => {
    const el = ref.current; if (!el) return;
    const io = new IntersectionObserver((es) => es.forEach(e => { if (e.isIntersecting) { setStart(true); io.disconnect(); }}), { threshold: 0.3 });
    io.observe(el); return () => io.disconnect();
  }, []);
  const num = useCountUp(72, 1400, start);
  const dialSize = Math.round(263 * 1.35);
  return (
    <section ref={ref} style={{
      position: "relative",
      paddingTop: 182, paddingBottom: 182,
      textAlign: "center", overflow: "hidden",
    }}>
      <div className="grid-bg" aria-hidden="true" style={{
        position: "absolute", inset: 0, opacity: 0.45, pointerEvents: "none",
      }} />
      <div style={{ ...pageStyles.shell, position: "relative" }}>
        <Reveal>
          <div style={{ ...pageStyles.eyebrow, marginBottom: 40, display: "inline-flex", alignItems: "center", gap: 12 }}>
            <span className="shimmer-line" aria-hidden="true" />
            <span>The SIMPL Score</span>
            <span className="shimmer-line" aria-hidden="true" />
          </div>
        </Reveal>
        <Reveal delay={120}>
          <div style={{ position: "relative", display: "inline-block", padding: "0 40px" }}>
            <div style={{ position: "absolute", inset: 0, display: "grid", placeItems: "center", pointerEvents: "none" }}>
              <div style={{ position: "relative", width: dialSize, height: dialSize }}>
                <ScoreDial value={start ? 72 : 0} size={dialSize} />
              </div>
            </div>
            <div style={{ display: "inline-grid", gridTemplateColumns: "auto auto", alignItems: "baseline", columnGap: 18, position: "relative" }}>
              <div className="mono" style={{
                fontSize: "clamp(160px, 24vw, 263px)",
                lineHeight: 0.85,
                letterSpacing: "-0.05em",
                color: "var(--accent)",
                fontWeight: 300,
                fontVariantNumeric: "tabular-nums",
              }}>{String(num).padStart(2, "0")}</div>
              <div className="mono" style={{ fontSize: 14, color: "var(--muted)", letterSpacing: "0.1em", textTransform: "uppercase" }}>/ 100</div>
            </div>
          </div>
        </Reveal>
        <Reveal delay={320}>
          <p style={{ maxWidth: 560, margin: "56px auto 0", fontSize: 19, lineHeight: 1.55 }}>
            Every site gets a SIMPL Score from 0 to 100. Most business owners have never seen theirs.
          </p>
        </Reveal>
        <Reveal delay={440}>
          <div style={{ marginTop: 36 }}>
            <a href="Scan.html" style={{
              display: "inline-flex", alignItems: "center", gap: 10,
              color: "var(--fg)", textDecoration: "none",
              borderBottom: "1px solid var(--fg)", paddingBottom: 4, fontSize: 15,
            }}>
              See yours<span aria-hidden="true">→</span>
            </a>
          </div>
        </Reveal>
      </div>
    </section>
  );
}
